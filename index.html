<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy Policies</title>
  <style>
    :root { --bg: #0d1210; --text: #e8e4e0; --accent: #6b9b6e; --muted: #8a9087; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 1.5rem; max-width: 720px; margin-inline: auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    ul { list-style: none; padding: 0; }
    li { margin: 0.75rem 0; }
    a { color: var(--accent); text-decoration: none; font-size: 1.1rem; }
    a:hover { text-decoration: underline; }
    .description { color: var(--muted); font-size: 0.9rem; margin-left: 0.25rem; }
  </style>
</head>
<body>
  <h1>Privacy Policies</h1>
  <ul>
    <li>
      <a href="undergrowth/">The Undergrowth</a>
      <span class="description">— Mobile idle game</span>
    </li>
    <li>
      <a href="example-project/">Example Project</a>
      <span class="description">— Template for new policies</span>
    </li>
  </ul>
</body>
</html>
